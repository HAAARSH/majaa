name: fmcgorders
description: Internal Business App for Madhav & Jagannath Associates
publish_to: none
version: 1.0.0+2

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  path_provider: ^2.1.2
  intl: ^0.20.2
  share_plus: ^12.0.1
  supabase_flutter: ^2.8.0
  sizer: ^3.0.0
  flutter_svg: ^2.0.10
  google_fonts: ^8.0.2
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  connectivity_plus: ^7.0.0
  fluttertoast: ^9.0.0
  pdf: ^3.11.1
  printing: ^5.13.2
  url_launcher: ^6.3.1
  package_info_plus: ^9.0.0
  fl_chart: ^1.2.0
  universal_html: ^2.2.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  qr_flutter: ^4.1.0
  image_picker: ^1.1.2
  google_sign_in: ^6.2.1
  dart_jsonwebtoken: ^2.9.0
  http: ^1.2.0
  file_picker: ^8.0.0
  csv: ^6.0.0
  workmanager: ^0.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
    - assets/google_fonts/
    - env.json
  fonts:
    - family: Manrope
      fonts:
        - asset: assets/fonts/Manrope-w200.ttf
          weight: 200
        - asset: assets/fonts/Manrope-w300.ttf
          weight: 300
        - asset: assets/fonts/Manrope-w400.ttf
          weight: 400
        - asset: assets/fonts/Manrope-w500.ttf
          weight: 500
        - asset: assets/fonts/Manrope-w600.ttf
          weight: 600
        - asset: assets/fonts/Manrope-w700.ttf
          weight: 700
        - asset: assets/fonts/Manrope-w800.ttf
          weight: 800