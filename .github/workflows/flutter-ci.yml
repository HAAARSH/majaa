name: Flutter CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed lib/
        continue-on-error: true

      - name: Analyze
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

  # `flutter test` is intentionally NOT in CI for this repo: the existing
  # widget_test.dart references `MyApp` (boilerplate that was never updated)
  # and the real app needs env.json + Supabase runtime that we don't ship to
  # CI. Add a real test job here once a runtime-free test suite exists.
